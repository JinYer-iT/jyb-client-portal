<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login &mdash; JYB Client Portal</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="/assets/css/portal.css">
</head>
<body>

<main class="login-wrap">
  <div class="login-box">

    <!-- Logo -->
    <div class="login-logo">
      <span class="login-logo-text">JYB</span>
    </div>

    <!-- Headline -->
    <h1 class="login-headline">Your Project Portal</h1>
    <p class="login-sub">Log in to see your projects, invoices, and files.</p>

    <!-- Status message -->
    <div id="login-msg" class="msg" role="alert" aria-live="polite"></div>

    <!-- Client login form -->
    <form class="login-form" id="client-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="token-input">Access Token</label>
        <input
          id="token-input"
          type="text"
          class="form-input"
          placeholder="Paste your access token"
          autocomplete="off"
          spellcheck="false"
        >
      </div>
      <button type="submit" class="btn btn-primary w-full" id="client-submit-btn">
        Access My Portal
      </button>
    </form>

    <!-- Footer links -->
    <div class="login-footer mt-md">
      <p class="login-footer-note">
        Don&rsquo;t have a token? Contact us at
        <a href="mailto:hello@jinyerbalance.com">hello@jinyerbalance.com</a>
      </p>
      <button class="admin-toggle-btn" id="admin-toggle" type="button">
        Agency login &rarr;
      </button>
    </div>

    <!-- Admin login (hidden by default) -->
    <form class="admin-form" id="admin-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="admin-pass">Admin Password</label>
        <input
          id="admin-pass"
          type="password"
          class="form-input"
          placeholder="Enter admin token"
          autocomplete="current-password"
        >
      </div>
      <button type="submit" class="btn btn-outline w-full" id="admin-submit-btn">
        Enter Admin Portal
      </button>
    </form>

  </div>
</main>

<script src="/assets/js/portal.js"></script>
<script>
(function () {
  var msg         = document.getElementById('login-msg');
  var clientForm  = document.getElementById('client-form');
  var clientBtn   = document.getElementById('client-submit-btn');
  var tokenInput  = document.getElementById('token-input');
  var adminToggle = document.getElementById('admin-toggle');
  var adminForm   = document.getElementById('admin-form');
  var adminPass   = document.getElementById('admin-pass');
  var adminBtn    = document.getElementById('admin-submit-btn');

  // ── If already logged in, skip ──
  if (JYB.getAdminToken()) {
    window.location.replace('/admin.html');
    return;
  }
  if (JYB.getClient()) {
    window.location.replace('/dashboard.html');
    return;
  }

  // ── Check for ?mode=admin ──
  var params = new URLSearchParams(window.location.search);
  if (params.get('mode') === 'admin') {
    adminForm.classList.add('visible');
  }

  // ── Auto-login via URL token ──
  var urlToken = JYB.getUrlToken();
  if (urlToken) {
    tokenInput.value = urlToken;
    // Trigger login automatically
    doClientLogin(urlToken);
  }

  // ── Admin toggle ──
  adminToggle.addEventListener('click', function () {
    adminForm.classList.toggle('visible');
    if (adminForm.classList.contains('visible')) {
      adminPass.focus();
      adminToggle.textContent = 'Cancel';
    } else {
      adminToggle.textContent = 'Agency login \u2192';
    }
  });

  // ── Client login ──
  clientForm.addEventListener('submit', function (e) {
    e.preventDefault();
    var token = tokenInput.value.trim();
    if (!token) {
      JYB.showMsg(msg, 'Please paste your access token.', 'error');
      return;
    }
    doClientLogin(token);
  });

  async function doClientLogin(token) {
    clientBtn.disabled = true;
    clientBtn.textContent = 'Checking\u2026';
    JYB.hideMsg(msg);

    try {
      var data = await JYB.apiFetch('/api/client/login', {
        method: 'POST',
        body: JSON.stringify({ token }),
      });

      if (data.success) {
        JYB.setClient({
          id:           data.client.id,
          name:         data.client.name,
          email:        data.client.email,
          company:      data.client.company,
          account_type: data.client.account_type,
          plan:         data.client.plan,
          token:        token,
        });
        window.location.replace('/dashboard.html');
      } else {
        JYB.showMsg(msg, 'Invalid token. Check your email or contact us.', 'error');
        clientBtn.disabled = false;
        clientBtn.textContent = 'Access My Portal';
      }
    } catch (err) {
      JYB.showMsg(msg, err.message || 'Invalid token. Check your email or contact us.', 'error');
      clientBtn.disabled = false;
      clientBtn.textContent = 'Access My Portal';
    }
  }

  // ── Admin login ──
  adminForm.addEventListener('submit', async function (e) {
    e.preventDefault();
    var token = adminPass.value.trim();
    if (!token) {
      JYB.showMsg(msg, 'Enter the admin token.', 'error');
      return;
    }

    adminBtn.disabled = true;
    adminBtn.textContent = 'Verifying\u2026';
    JYB.hideMsg(msg);

    try {
      // Verify by hitting a protected endpoint
      var data = await JYB.apiFetch('/api/admin/clients', {
        headers: { Authorization: 'Bearer ' + token },
      });

      if (data.success) {
        JYB.setAdminToken(token);
        window.location.replace('/admin.html');
      } else {
        JYB.showMsg(msg, 'Incorrect admin token.', 'error');
        adminBtn.disabled = false;
        adminBtn.textContent = 'Enter Admin Portal';
      }
    } catch (err) {
      JYB.showMsg(msg, 'Incorrect admin token.', 'error');
      adminBtn.disabled = false;
      adminBtn.textContent = 'Enter Admin Portal';
    }
  });

})();
</script>

</body>
</html>
